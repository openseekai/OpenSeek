steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/github.com/yashbansal-dev/openseek:$COMMIT_SHA',
      '-f', 'backend/Dockerfile',
      'backend'
    ]

  # 2. Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/github.com/yashbansal-dev/openseek:$COMMIT_SHA']

  # 3. Deploy the image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'openseek',
      '--image', 'gcr.io/$PROJECT_ID/github.com/yashbansal-dev/openseek:$COMMIT_SHA',
      '--region', 'europe-west1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--memory', '2Gi'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
